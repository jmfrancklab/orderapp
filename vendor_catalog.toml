# ACERT ordering — vendor catalog
# Edit this file to add vendors or tune price extraction.
# API keys → environment variables only (never here).
#
# [[vendors]]          one block per vendor
# [vendors.price]      price-extraction config (subtable of last [[vendors]])
# [vendors.quote_storage]  marks this as a PDF-quote host, not a purchase page

# ── Quote-storage providers (PDF quotes hosted here, not purchase pages) ──────

[[vendors]]
id      = "dropbox"
name    = "Dropbox"
domains = ["dropbox.com", "dl.dropboxusercontent.com"]

[vendors.quote_storage]
provider    = "dropbox"
login_hint  = "Dropbox wouldn't hand over the file — the link may be password-protected or restricted to invited people. Use a 'anyone with the link' share."

[[vendors]]
id      = "sharepoint"
name    = "SharePoint"
domains = ["sharepoint.com"]

[vendors.quote_storage]
provider    = "sharepoint"
login_hint  = "SharePoint asked for a Microsoft sign-in, so this share is restricted to the organization. Until Microsoft sign-in is wired into this app, use an 'Anyone with the link' share, or enter the vendor by hand."

[[vendors]]
id      = "onedrive"
name    = "OneDrive"
domains = ["1drv.ms", "onedrive.live.com"]

[vendors.quote_storage]
provider    = "onedrive"
login_hint  = "OneDrive wouldn't hand over the file — check that the link is shared with 'Anyone with the link'."

# ── Purchase-page vendors ─────────────────────────────────────────────────────

[[vendors]]
id      = "mouser"
name    = "Mouser Electronics"
domains = ["mouser.com", "mou.sr"]
address = "1000 North Main Street, Mansfield, TX 76063"
phone   = "800-346-6873"
website = "mouser.com"

[vendors.price]
api_handler  = "mouser"
api_key_env  = "MOUSER_API_KEY"
part_from_url = '/ProductDetail/[^/]+/([A-Za-z0-9._-]+)'

[[vendors]]
id      = "digikey"
name    = "DigiKey Electronics"
domains = ["digikey.com"]
address = "701 Brooks Ave S, Thief River Falls, MN 56701"
phone   = "800-344-4539"
website = "digikey.com"

[vendors.price]
api_handler       = "digikey"
client_id_env     = "DIGIKEY_CLIENT_ID"
client_secret_env = "DIGIKEY_CLIENT_SECRET"
part_from_url     = '/en/products/detail/[^/]+/[^/]+/(\d+)'

[[vendors]]
id      = "fisher"
name    = "Thermo Fisher Scientific"
domains = ["fishersci.com", "thermofisher.com", "fisherscientific.com"]
address = "168 Third Avenue, Waltham, MA 02451"
phone   = "800-766-7000"
website = "fishersci.com"

[vendors.price]
extra_patterns = [
  '"price"\s*:\s*([0-9]+\.?[0-9]*)',
  '''data-analytics-product-price=["']([0-9.]+)["']''',
]

[[vendors]]
id      = "amazon"
name    = "Amazon"
domains = ["amazon.com", "amzn.to", "a.co"]

[vendors.price]
extra_patterns = [
  '"priceAmount"\s*:\s*"?([\d.]+)"?',
  '"buyingPrice"\s*:\s*([\d.]+)',
]

[[vendors]]
id      = "trc"
name    = "Toronto Research Chemicals"
domains = ["trc-canada.com"]
address = "2 Brisbane Road, Toronto, ON M3J 2J8, Canada"
phone   = "416-665-9696"
website = "trc-canada.com"

[vendors.price]
extra_patterns = [
  '"price"\s*:\s*"?([\d.]+)"?',
  '''id=["']ctl00_ContentPlaceHolder1_price["'][^>]*>\s*\$\s*([\d,]+\.?\d*)''',
]

[[vendors]]
id      = "sigma"
name    = "MilliporeSigma"
domains = ["sigmaaldrich.com", "sigma-aldrich.com", "emdmillipore.com", "merckmillipore.com"]
address = "3050 Spruce Street, St. Louis, MO 63103"
phone   = "800-325-3010"
website = "sigmaaldrich.com"

[vendors.price]
extra_patterns = [
  '"price"\s*:\s*"?([\d.]+)"?',
  '''data-price=["']([0-9.]+)["']''',
]

[[vendors]]
id      = "ebay"
name    = "eBay"
domains = ["ebay.com", "ebay.co.uk", "ebay.ca"]
address = "2025 Hamilton Avenue, San Jose, CA 95125"
phone   = "866-540-3229"
website = "ebay.com"

[vendors.price]
extra_patterns = ['"price"\s*:\s*"?([\d.]+)"?']
