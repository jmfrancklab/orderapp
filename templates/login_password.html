<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · ACERT ordering</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">

<form method="post" class="login-card">
  <span class="wordmark">ACERT<span class="wordmark-sub">ordering</span></span>
  {% if creating %}
  <p class="hint">Choose a password for <strong>{{ email }}</strong>. You'll enter it each time you sign in.</p>
  <label for="password">New password</label>
  <input id="password" name="password" type="password" required autofocus
         minlength="8" placeholder="at least 8 characters">
  <label for="confirm">Confirm password</label>
  <input id="confirm" name="confirm" type="password" required placeholder="same again">
  {% else %}
  <p class="hint">Enter the password for <strong>{{ email }}</strong>.</p>
  <label for="password">Password</label>
  <input id="password" name="password" type="password" required autofocus>
  {% endif %}
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <button type="submit">Continue</button>
  <p class="hint" style="margin-top:.7rem;text-align:center">
    <a href="{{ url_for('login') }}">← Different email</a>
  </p>
</form>

</body>
</html>
