{% extends "base.html" %}
{% block title %}Projects{% endblock %}
{% block content %}

<p class="explain">Projects feed the project dropdown on the order sheet.</p>

{% for p in projects %}
<form id="p{{ p.id }}" method="post" action="{{ url_for('update_project', pid=p.id) }}"></form>
{% endfor %}
<form id="pnew" method="post" action="{{ url_for('projects') }}"></form>

<div class="table-wrap">
<table class="ref-table">
  <thead><tr><th>Project</th><th>Notes</th><th></th></tr></thead>
  <tbody>
    {% for p in projects %}
    <tr>
      <td><input form="p{{ p.id }}" name="name" value="{{ p.name }}" required></td>
      <td><input form="p{{ p.id }}" name="notes" value="{{ p.notes }}"></td>
      <td><button form="p{{ p.id }}" type="submit" class="mini">Save</button></td>
    </tr>
    {% endfor %}
    <tr class="new-row">
      <td><input form="pnew" name="name" placeholder="New project" required></td>
      <td><input form="pnew" name="notes" placeholder="notes"></td>
      <td><button form="pnew" type="submit" class="mini">Add</button></td>
    </tr>
  </tbody>
</table>
</div>

<div class="sheet-actions" style="margin-top:.9rem">
  <a href="{{ url_for('export_xlsx', view='projects') }}" class="mini export-btn">Export to Excel</a>
</div>

{% endblock %}
